<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<title>橙ヶ丘2.5D 床・小物メーカー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{color-scheme:dark;--bg:#0d1218;--panel:#18212c;--panel2:#111922;--line:#344456;--text:#edf4f5;--muted:#9fb0bc;--gold:#e5b75e;--gold2:#fff0b8}html,body{height:100%;background:var(--bg);color:var(--text);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif}body{overflow:hidden}button,input,select{font:inherit}button{border:1px solid #617489;background:#263647;color:var(--text);border-radius:9px;padding:9px 11px;font-weight:800;cursor:pointer}button:hover,button.active,button.primary{background:var(--gold);border-color:var(--gold2);color:#1c211f}input,select{width:100%;margin-top:5px;padding:8px;border:1px solid #43556a;border-radius:8px;background:#0d151e;color:var(--text)}input[type=color]{height:39px;padding:3px}input[type=range]{padding:0;accent-color:var(--gold)}label{display:block;margin-top:10px;color:#c6d2db;font-size:11px;font-weight:800}#app{display:grid;grid-template-columns:310px minmax(0,1fr) 300px;height:100%}aside{overflow:auto;background:var(--panel);padding:15px;border-right:1px solid var(--line)}#right{border-right:0;border-left:1px solid var(--line)}h1{font-size:18px;color:#ffd98b;margin-bottom:5px}h2{font-size:12px;color:#a9c7e6;margin:18px 0 8px}p{font-size:11px;line-height:1.65;color:var(--muted)}.creator-switch{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:12px 0}.creator-switch button{padding:9px 4px;font-size:10px}.row{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}.row>*{flex:1}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.panel{display:none}.panel.active{display:block}#stage{position:relative;min-width:0;background:radial-gradient(circle at 50% 42%,#33484a 0,#111820 72%);overflow:hidden}#cv{display:block;width:100%;height:100%}#toast{position:absolute;left:50%;top:18px;transform:translateX(-50%);padding:9px 14px;border:1px solid var(--gold);background:rgba(12,18,24,.94);color:#fff1be;border-radius:9px;font-size:11px;font-weight:900;opacity:0;pointer-events:none;transition:.2s}#toast.show{opacity:1}.note{padding:9px;background:var(--panel2);border-left:3px solid var(--gold);margin-top:9px}.mini{font-size:10px}.check{display:flex;align-items:center;gap:7px;padding:8px;background:var(--panel2);border:1px solid var(--line);border-radius:8px}.check input{width:auto;margin:0}.pill{position:absolute;left:12px;top:12px;padding:7px 9px;border:1px solid #ffe4a2;background:#101820dd;color:#ffe1a0;font-size:10px;font-weight:900}@media(max-width:900px){body{overflow:auto}#app{height:auto;grid-template-columns:1fr}aside{border:0;border-bottom:1px solid var(--line)}#stage{height:520px;order:-1}#right{border:0}}
</style>
</head>
<body>
<div id="app">
<aside>
  <h1>橙ヶ丘2.5D 素材メーカー</h1><p>建物と同じ光・輪郭・3Dチビトーンで、街の床と小物を作ります。</p>
  <div class="creator-switch"><button id="buildingBtn">建物</button><button data-mode="tile">床・水辺</button><button data-mode="prop">街の小物</button></div>
  <div id="tilePanel" class="panel">
    <h2>床・水辺の種類</h2><label>種類<select id="tileType"><option value="grass">芝生</option><option value="dirt">土</option><option value="concrete">コンクリート</option><option value="stone">石畳</option><option value="sand">砂地</option><option value="snow">雪</option><option value="ice">氷</option><option value="pond">池</option><option value="river">川</option><option value="wood">ウッドデッキ</option></select></label>
    <label>素材名<input id="tileName" maxlength="24"></label><div class="grid2"><label>基本色<input id="tileColor" type="color"></label><label>差し色<input id="tileAccent" type="color"></label></div>
    <label>模様の量<input id="tileDensity" type="range" min="1" max="12" value="6"></label><label>流れの向き<select id="tileDirection"><option value="horizontal">横</option><option value="vertical">縦</option><option value="diagonal">斜め</option></select></label>
    <label class="check"><input id="tileEdge" type="checkbox">縁・岸をつける</label>
  </div>
  <div id="propPanel" class="panel">
    <h2>小物の種類</h2><label>種類<select id="propType"><option value="tree">広葉樹</option><option value="cherry">桜</option><option value="pine">針葉樹</option><option value="bench">ベンチ</option><option value="lamp">街灯</option><option value="sign">案内看板</option><option value="mailbox">郵便ポスト</option><option value="fence">フェンス</option><option value="rock">岩</option><option value="flowerbed">花壇</option><option value="well">井戸</option><option value="crate">木箱</option><option value="bush">茂み</option></select></label>
    <label>素材名<input id="propName" maxlength="24"></label><div class="grid2"><label>主な色<input id="propColor" type="color"></label><label>差し色<input id="propAccent" type="color"></label></div>
    <div class="grid2"><label>横マス<input id="propWidth" type="number" min="1" max="6" value="1"></label><label>縦マス<input id="propDepth" type="number" min="1" max="6" value="1"></label></div>
    <label>大きさ<input id="propScale" type="range" min="60" max="145" value="100"></label><label class="check"><input id="propShadow" type="checkbox" checked>接地影をつける</label>
  </div>
</aside>
<main id="stage"><canvas id="cv"></canvas><div class="pill" id="modePill">床・水辺 / 角度ロック</div><div id="toast"></div></main>
<aside id="right">
  <h2>プレビュー</h2><p id="summary">素材を調整すると、ここへすぐ反映されます。</p><div class="note"><p>床は1マス単位で塗れる素材、小物は複数マスへ置ける透過素材として登録します。</p></div>
  <h2>街の素材ライブラリ</h2><div class="row"><button id="registerBtn" class="primary">街で使う素材として登録</button></div><p id="status" class="mini">登録後、街編集ツールへすぐ表示されます。</p>
  <div class="row"><button id="duplicateBtn">バリエーションとして複製</button><button id="newBtn">新しく作る</button></div><p id="draftStatus" class="mini">作りかけは自動保存されます。⌘/Ctrl＋Enterでも登録できます。</p>
  <h2>書き出し</h2><div class="row"><button id="pngBtn">透過PNG保存</button><button id="jsonBtn">設定JSON保存</button></div>
  <h2>移動</h2><div class="row"><button id="editorBtn">タイル式街編集</button><button id="buildingBtn2">建物メーカー</button></div>
</aside>
</div>
<script>
const $=id=>document.getElementById(id),cv=$('cv'),ctx=cv.getContext('2d'),DB='aono-tantei-building-library',STORE='buildings';let mode=new URLSearchParams(location.search).get('mode')==='prop'?'prop':'tile',editingId=null,view={w:0,h:0,dpr:1},draftReady=false;
const TILE_DEFAULTS={grass:['芝生','#6fa95e','#b8da72'],dirt:['土','#a6794f','#d0a06d'],concrete:['コンクリート','#aaa99f','#dedbd0'],stone:['石畳','#858989','#c5c1b4'],sand:['砂地','#d6bb7e','#f1d99d'],snow:['雪','#eaf4f3','#ffffff'],ice:['氷','#9fd7e6','#e9fbff'],pond:['池','#4f9db8','#b7eef2'],river:['川','#4b9fca','#d4f4ff'],wood:['ウッドデッキ','#95633f','#d39a61']};
const PROP_DEFAULTS={tree:['広葉樹','#4f8b4a','#a4d36f'],cherry:['桜','#e88fae','#ffd0dd'],pine:['針葉樹','#356c4d','#6fa66d'],bench:['ベンチ','#8c5b36','#d09455'],lamp:['街灯','#33414d','#ffe495'],sign:['案内看板','#4d7693','#f4d270'],mailbox:['郵便ポスト','#cf4b45','#f4b04e'],fence:['フェンス','#6b7072','#c2c7c5'],rock:['岩','#777d7c','#b7b9b2'],flowerbed:['花壇','#6c914c','#f2a0b1'],well:['井戸','#777b78','#c9c5b8'],crate:['木箱','#8a5933','#d39a58'],bush:['茂み','#477b48','#8fbd62']};
function openDB(){return new Promise((resolve,reject)=>{const r=indexedDB.open(DB,1);r.onupgradeneeded=()=>{if(!r.result.objectStoreNames.contains(STORE))r.result.createObjectStore(STORE,{keyPath:'id'})};r.onsuccess=()=>resolve(r.result);r.onerror=()=>reject(r.error)})}async function put(record){const db=await openDB();return new Promise((resolve,reject)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(record);tx.oncomplete=()=>{db.close();resolve()};tx.onerror=()=>reject(tx.error)})}
function toast(t){$('toast').textContent=t;$('toast').classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>$('toast').classList.remove('show'),1500)}function shade(hex,a){const n=parseInt(hex.slice(1),16);return`rgb(${Math.max(0,Math.min(255,(n>>16)+a))},${Math.max(0,Math.min(255,((n>>8)&255)+a))},${Math.max(0,Math.min(255,(n&255)+a))})`}
function rounded(c,x,y,w,h,r,fill,stroke){c.beginPath();c.roundRect(x,y,w,h,r);c.fillStyle=fill;c.fill();if(stroke){c.strokeStyle=stroke;c.lineWidth=3;c.stroke()}}function ellipse(c,x,y,rx,ry,fill){c.fillStyle=fill;c.beginPath();c.ellipse(x,y,rx,ry,0,0,Math.PI*2);c.fill()}
function tileState(){return{category:'tile',type:$('tileType').value,name:$('tileName').value||TILE_DEFAULTS[$('tileType').value][0],color:$('tileColor').value,accent:$('tileAccent').value,density:+$('tileDensity').value,direction:$('tileDirection').value,edge:$('tileEdge').checked,width:1,depth:1}}
function propState(){return{category:'prop',type:$('propType').value,name:$('propName').value||PROP_DEFAULTS[$('propType').value][0],color:$('propColor').value,accent:$('propAccent').value,width:+$('propWidth').value||1,depth:+$('propDepth').value||1,scale:+$('propScale').value/100,shadow:$('propShadow').checked}}
function current(){return mode==='tile'?tileState():propState()}
function drawTile(c,w,h,s,transparent=false){if(!transparent){c.fillStyle='#26363c';c.fillRect(0,0,w,h)}const pad=transparent?0:70,x=pad,y=pad,ww=w-pad*2,hh=h-pad*2;c.fillStyle=s.color;c.fillRect(x,y,ww,hh);const seed=(i,j)=>(Math.sin(i*91.7+j*33.1)*43758.5)%1;for(let i=0;i<s.density*4;i++){const px=x+Math.abs(seed(i,2))*ww,py=y+Math.abs(seed(i,7))*hh;c.strokeStyle=i%2?s.accent:shade(s.color,-22);c.fillStyle=c.strokeStyle;c.lineWidth=4;if(['grass','snow'].includes(s.type)){c.beginPath();c.moveTo(px,py+12);c.lineTo(px+7,py-5);c.moveTo(px+2,py+10);c.lineTo(px-5,py);c.stroke()}else if(['pond','river','ice'].includes(s.type)){c.beginPath();if(s.direction==='vertical'){c.moveTo(px,py-22);c.quadraticCurveTo(px+10,py,px,py+22)}else if(s.direction==='diagonal'){c.moveTo(px-18,py-18);c.quadraticCurveTo(px+8,py,px+18,py+18)}else{c.moveTo(px-24,py);c.quadraticCurveTo(px,py-8,px+24,py)}c.stroke()}else if(s.type==='wood'){c.fillRect(x,py,ww,3)}else{ellipse(c,px,py,7+(i%3)*4,3+(i%2)*2,c.fillStyle)}}if(s.type==='stone'||s.type==='concrete'){c.strokeStyle='rgba(255,255,255,.22)';c.lineWidth=3;for(let yy=y;yy<y+hh;yy+=hh/4){c.beginPath();c.moveTo(x,yy);c.lineTo(x+ww,yy);c.stroke()}for(let xx=x;xx<x+ww;xx+=ww/4){c.beginPath();c.moveTo(xx,y);c.lineTo(xx,y+hh);c.stroke()}}if(s.edge){c.strokeStyle=s.accent;c.lineWidth=Math.max(8,ww*.025);c.strokeRect(x+4,y+4,ww-8,hh-8)}if(!transparent){c.save();c.globalCompositeOperation='destination-in';c.beginPath();c.moveTo(w*.5,25);c.lineTo(w-25,h*.5);c.lineTo(w*.5,h-25);c.lineTo(25,h*.5);c.closePath();c.fill();c.restore()}}
function drawProp(c,w,h,s){const cx=w/2,base=h*.8,k=s.scale;if(s.shadow){c.filter='blur(8px)';ellipse(c,cx,base,w*.22*k,h*.045*k,'rgba(0,0,0,.28)');c.filter='none'}c.lineJoin='round';if(['tree','cherry','pine','bush'].includes(s.type)){if(s.type!=='bush'){rounded(c,cx-23*k,base-220*k,46*k,230*k,18*k,'#70482f','#392d25')}const balls=s.type==='pine'?[[0,-250,115],[-65,-175,100],[65,-175,100],[0,-100,110]]:[[0,-220,105],[-85,-165,90],[85,-165,90],[-48,-90,90],[52,-88,95]];for(const [dx,dy,r] of balls){const g=c.createRadialGradient(cx+(dx-25)*k,base+(dy-30)*k,5,cx+dx*k,base+dy*k,r*k);g.addColorStop(0,s.accent);g.addColorStop(1,shade(s.color,-25));ellipse(c,cx+dx*k,base+dy*k,r*k,r*.78*k,g)}if(s.type==='cherry')for(let i=0;i<18;i++)ellipse(c,cx+((i*47)%180-90)*k,base+((-i*31)%150-80)*k,7*k,5*k,'#ffe3ea')}else if(s.type==='bench'){rounded(c,cx-170*k,base-115*k,340*k,55*k,12*k,s.color,shade(s.color,-50));rounded(c,cx-145*k,base-230*k,290*k,72*k,12*k,s.accent,shade(s.color,-50));c.fillStyle='#313c43';c.fillRect(cx-125*k,base-65*k,24*k,75*k);c.fillRect(cx+100*k,base-65*k,24*k,75*k)}else if(s.type==='lamp'){c.fillStyle=s.color;c.fillRect(cx-16*k,base-330*k,32*k,340*k);rounded(c,cx-65*k,base-390*k,130*k,95*k,24*k,s.color,shade(s.color,-45));ellipse(c,cx,base-345*k,38*k,30*k,s.accent)}else if(s.type==='sign'){c.fillStyle=shade(s.color,-45);c.fillRect(cx-14*k,base-180*k,28*k,190*k);rounded(c,cx-150*k,base-310*k,300*k,150*k,18*k,s.color,shade(s.color,-55));c.fillStyle=s.accent;c.font=`900 ${38*k}px sans-serif`;c.textAlign='center';c.fillText('橙ヶ丘',cx,base-220*k)}else if(s.type==='mailbox'){c.fillStyle=shade(s.color,-45);c.fillRect(cx-15*k,base-100*k,30*k,110*k);rounded(c,cx-90*k,base-250*k,180*k,170*k,45*k,s.color,shade(s.color,-55));c.fillStyle=s.accent;c.fillRect(cx-55*k,base-195*k,110*k,20*k)}else if(s.type==='fence'){c.fillStyle=s.color;c.fillRect(cx-220*k,base-180*k,440*k,34*k);c.fillRect(cx-220*k,base-85*k,440*k,34*k);for(let x=-200;x<=200;x+=100)c.fillRect(cx+(x-14)*k,base-235*k,28*k,245*k)}else if(s.type==='rock'){for(const [dx,dy,r] of [[0,-65,100],[-85,-25,68],[90,-18,74]]){c.fillStyle=dx?s.color:s.accent;c.beginPath();c.moveTo(cx+(dx-r)*k,base+dy*k);c.lineTo(cx+(dx-r*.45)*k,base+(dy-r)*k);c.lineTo(cx+(dx+r*.45)*k,base+(dy-r*.85)*k);c.lineTo(cx+(dx+r)*k,base+dy*k);c.closePath();c.fill()}}else if(s.type==='flowerbed'){rounded(c,cx-190*k,base-105*k,380*k,115*k,18*k,'#8b5a3a','#52382b');for(let i=0;i<11;i++){ellipse(c,cx+((i*73)%330-165)*k,base-(90+(i%3)*22)*k,25*k,22*k,s.color);ellipse(c,cx+((i*73)%330-165)*k,base-(105+(i%3)*22)*k,8*k,8*k,s.accent)}}else if(s.type==='well'){ellipse(c,cx,base-120*k,155*k,72*k,s.accent);c.fillStyle=s.color;c.fillRect(cx-155*k,base-120*k,310*k,110*k);ellipse(c,cx,base-120*k,155*k,72*k,shade(s.color,25));ellipse(c,cx,base-120*k,115*k,45*k,'#243b43')}else if(s.type==='crate'){rounded(c,cx-140*k,base-260*k,280*k,270*k,12*k,s.color,shade(s.color,-55));c.strokeStyle=s.accent;c.lineWidth=24*k;c.strokeRect(cx-115*k,base-235*k,230*k,220*k);c.beginPath();c.moveTo(cx-105*k,base-220*k);c.lineTo(cx+105*k,base-20*k);c.moveTo(cx+105*k,base-220*k);c.lineTo(cx-105*k,base-20*k);c.stroke()}}
function render(c,w,h,s,exportMode=false){c.clearRect(0,0,w,h);if(!exportMode){for(let y=0;y<h;y+=24)for(let x=0;x<w;x+=24){c.fillStyle=(x/24+y/24)%2?'#dce5e5':'#f4f7f5';c.fillRect(x,y,24,24)}}if(s.category==='tile')drawTile(c,w,h,s,exportMode);else drawProp(c,w,h,s)}
function draw(){const s=current();render(ctx,view.w,view.h,s,false);$('summary').textContent=`${s.category==='tile'?'床・水辺':'街の小物'}「${s.name}」／ ${s.width}×${s.depth}マス`;$('modePill').textContent=`${s.category==='tile'?'床・水辺':'街の小物'} / 角度ロック`;if(draftReady){clearTimeout(draw.t);draw.t=setTimeout(()=>{localStorage.setItem(`orengaoka-asset-maker-draft-${mode}`,JSON.stringify(s));$('draftStatus').textContent='作りかけを自動保存しました。⌘/Ctrl＋Enterでも登録できます。'},220)}}
function resize(){const r=cv.getBoundingClientRect();view.w=Math.round(r.width);view.h=Math.round(r.height);view.dpr=Math.min(2,devicePixelRatio||1);cv.width=view.w*view.dpr;cv.height=view.h*view.dpr;ctx.setTransform(view.dpr,0,0,view.dpr,0,0);draw()}function canvasBlob(c){return new Promise((res,rej)=>c.toBlob(b=>b?res(b):rej(new Error('blob')),'image/png'))}function trim(source,p=18){const d=source.getContext('2d').getImageData(0,0,source.width,source.height).data;let x0=source.width,y0=source.height,x1=-1,y1=-1;for(let y=0;y<source.height;y++)for(let x=0;x<source.width;x++)if(d[(y*source.width+x)*4+3]>3){x0=Math.min(x0,x);y0=Math.min(y0,y);x1=Math.max(x1,x);y1=Math.max(y1,y)}if(x1<0)return source;x0=Math.max(0,x0-p);y0=Math.max(0,y0-p);x1=Math.min(source.width-1,x1+p);y1=Math.min(source.height-1,y1+p);const o=document.createElement('canvas');o.width=x1-x0+1;o.height=y1-y0+1;o.getContext('2d').drawImage(source,x0,y0,o.width,o.height,0,0,o.width,o.height);return o}function download(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),800)}function safe(s){return(s||'asset').replace(/[\\/:*?"<>|\s]+/g,'_')}
function setMode(next){mode=next;document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));$('tilePanel').classList.toggle('active',mode==='tile');$('propPanel').classList.toggle('active',mode==='prop');draw()}
function applyConfig(s){if(!s)return;const prefix=s.category==='prop'?'prop':'tile';for(const [key,value] of Object.entries(s)){const el=$(key==='type'?`${prefix}Type`:key==='name'?`${prefix}Name`:key==='color'?`${prefix}Color`:key==='accent'?`${prefix}Accent`:key==='width'?'propWidth':key==='depth'?'propDepth':key==='scale'?'propScale':key==='shadow'?'propShadow':key==='density'?'tileDensity':key==='direction'?'tileDirection':key==='edge'?'tileEdge':'');if(!el)continue;if(el.type==='checkbox')el.checked=!!value;else el.value=key==='scale'?Math.round(value*100):value}}
for(const el of document.querySelectorAll('input,select'))el.addEventListener('input',draw);document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));$('tileType').onchange=()=>{const d=TILE_DEFAULTS[$('tileType').value];$('tileName').value=d[0];$('tileColor').value=d[1];$('tileAccent').value=d[2];draw()};$('propType').onchange=()=>{const d=PROP_DEFAULTS[$('propType').value];$('propName').value=d[0];$('propColor').value=d[1];$('propAccent').value=d[2];draw()};
$('registerBtn').onclick=async()=>{try{const s=current(),out=document.createElement('canvas');out.width=out.height=640;render(out.getContext('2d'),640,640,s,true);const imageBlob=await canvasBlob(s.category==='prop'?trim(out):out),id=editingId||`${s.category}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,7)}`;await put({id,type:'orengaoka-25d-asset-library',projection:'2:1-orthographic',category:s.category,name:s.name,kind:s.type,width:s.width,depth:s.depth,to:'',config:s,imageBlob,createdAt:Date.now(),updatedAt:Date.now()});editingId=id;$('status').textContent=`「${s.name}」を登録済み。もう一度押すと上書きします。`;$('registerBtn').textContent='登録内容を更新';toast('街の素材ライブラリへ登録しました')}catch(e){console.error(e);toast('登録に失敗しました')}};
$('pngBtn').onclick=async()=>{const s=current(),out=document.createElement('canvas');out.width=out.height=640;render(out.getContext('2d'),640,640,s,true);download(await canvasBlob(s.category==='prop'?trim(out):out),`${safe(s.name)}.png`);toast('PNGを書き出しました')};$('jsonBtn').onclick=()=>{const s=current();download(new Blob([JSON.stringify({...s,type:'orengaoka-25d-asset'},null,2)],{type:'application/json'}),`${safe(s.name)}.json`);toast('設定を書き出しました')};
$('duplicateBtn').onclick=()=>{editingId=null;const input=$(mode==='tile'?'tileName':'propName');input.value=`${input.value||'素材'} バリエーション`;$('status').textContent='元の素材を残したまま、新しい素材として登録できます。';$('registerBtn').textContent='街で使う素材として登録';draw();toast('バリエーションを作成しました')};$('newBtn').onclick=()=>{editingId=null;localStorage.removeItem(`orengaoka-asset-maker-draft-${mode}`);if(mode==='tile')$('tileType').dispatchEvent(new Event('change'));else $('propType').dispatchEvent(new Event('change'));$('status').textContent='新しい素材を作成中です。';$('registerBtn').textContent='街で使う素材として登録';toast('新規作成に切り替えました')};
$('buildingBtn').onclick=$('buildingBtn2').onclick=()=>location.href='town_building_maker.html';$('editorBtn').onclick=()=>location.href='town_tile_editor.html';window.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();$('registerBtn').click()}});window.addEventListener('resize',resize);$('tileType').dispatchEvent(new Event('change'));$('propType').dispatchEvent(new Event('change'));let restored=false;try{const handoff=JSON.parse(localStorage.getItem('orengaoka-asset-maker-edit')||'null');if(handoff?.config){const s=handoff.config;editingId=handoff.id;mode=s.category==='prop'?'prop':'tile';applyConfig(s);localStorage.removeItem('orengaoka-asset-maker-edit');$('status').textContent=`「${handoff.name||s.name}」を再編集中。登録内容を更新できます。`;$('registerBtn').textContent='登録内容を更新';restored=true}}catch(e){}if(!restored)try{const draft=JSON.parse(localStorage.getItem(`orengaoka-asset-maker-draft-${mode}`)||'null');if(draft){applyConfig(draft);$('draftStatus').textContent='前回の作りかけを復元しました。'}}catch(e){}draftReady=true;setMode(mode);resize();
</script>
</body>
